<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparison Card 01</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container {
    display: flex;
    gap: 2px;
    max-width: 1200px;
    width: 100%;
  }
  .hero {
    flex: 1;
    background: #1a1a1a;
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 480px;
  }
  .hero:first-child { border-radius: 12px 0 0 12px; }
  .hero:last-child { border-radius: 0 12px 12px 0; }
  .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 32px;
  }
  .h1 {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.2;
    color: #e0e0e0;
    margin-bottom: 20px;
  }
  .sub {
    font-size: 16px;
    line-height: 1.6;
    color: #888;
    margin-bottom: 36px;
    max-width: 420px;
  }
  .cta {
    display: inline-block;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #e0e0e0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    text-decoration: none;
    cursor: pointer;
    width: fit-content;
    transition: background 0.2s;
  }
  .cta:hover { background: rgba(255,255,255,0.12); }
  .divider {
    width: 2px;
    background: #111;
  }
</style>
</head>
<body>

<!-- Card 1 -->

<div class="container">
  <div class="hero">
    <div class="label">Product A</div>
    <div class="h1">Your words never leave your device.</div>
    <div class="sub">On-device transcription that processes everything locally. Your audio never touches a server.</div>
    <div class="cta">Download free</div>
  </div>
  <div class="hero">
    <div class="label">Product B</div>
    <div class="h1">The AI notepad for people in back-to-back meetings</div>
    <div class="sub">Takes your raw meeting notes and makes them awesome.</div>
    <div class="cta">Get started</div>
  </div>
</div>

</body>
</html>
